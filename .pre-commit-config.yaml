repos:
 - repo: local
   hooks:
    - id: ruff-format
      name: ruff-format
      entry: uv run ruff format
      language: system
      types: [python]
    - id: ruff-check
      name: ruff-check
      entry: uv run ruff check --fix
      language: system
      types: [python]
    - id: pylint
      name: pylint
      exclude: ^tests/
      entry: uv run pylint
      language: system
      types: [python]
    - id: mypy
      name: mypy
      exclude: ^tests/
      entry: uv run mypy
      language: system
      types: [python]